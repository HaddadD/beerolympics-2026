<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>2026 Canada Day Beerolympics — SideQuest Awards</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=VT323&display=swap" rel="stylesheet">
<style>
  :root{
    --black:#0a0908;
    --red-dark:#5c0f0c;
    --red:#9c1f18;
    --red-bright:#c22a20;
    --gold:#d4af37;
    --gold-light:#f3d876;
    --cream:#fdf6ea;
    --cream-dim:#f3e3c2;
    --stripe-pink:#f7dede;
    --ink:#1c1210;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    background:var(--black);
    color:var(--cream);
    font-family:'VT323', monospace;
    font-size:20px;
    padding:0;
    min-height:100vh;
  }

  /* ── shared site header (identical markup + CSS on all three pages) ── */
  .site-header{
    position:relative;z-index:60;width:100%;flex-shrink:0;
    background:#CC0000;border-bottom:6px solid #111;
    text-align:center;
    padding:clamp(14px,2vh,22px) clamp(48px,5vw,72px) clamp(12px,1.8vh,18px);
  }
  .site-header h1{
    margin:0;
    font-family:'Press Start 2P',monospace;
    font-size:clamp(15px,2.6vw,30px);
    color:#fff;text-shadow:3px 3px 0 rgba(0,0,0,.45);
    letter-spacing:2px;line-height:1.3;
  }
  .site-header .sitenav{
    display:flex;justify-content:center;flex-wrap:wrap;
    gap:clamp(8px,1vw,14px);
    margin-top:clamp(10px,1.6vh,16px);
  }
  .site-header .sitenav a{
    font-family:'Press Start 2P',monospace;
    font-size:clamp(8px,1vw,12px);letter-spacing:1px;line-height:1;
    text-decoration:none;color:#111;background:#fff;
    border:3px solid #111;box-shadow:3px 3px 0 rgba(0,0,0,.35);
    padding:clamp(8px,1.1vh,12px) clamp(10px,1.2vw,16px);
  }
  .site-header .sitenav a:hover{background:#ffd700}
  .site-header .sitenav a:active{transform:translate(2px,2px);box-shadow:1px 1px 0 rgba(0,0,0,.35)}
  .site-header .sitenav a.is-active{background:#111;color:#fff;pointer-events:none}
  .site-header .fsbtn{
    position:absolute;top:clamp(12px,1.8vh,20px);right:clamp(10px,1.4vw,22px);
    display:flex;align-items:center;justify-content:center;
    width:clamp(34px,3vw,44px);height:clamp(34px,3vw,44px);
    font-family:'Press Start 2P',monospace;font-size:clamp(13px,1.3vw,18px);line-height:1;
    cursor:pointer;color:#fff;background:#111;border:3px solid #111;box-shadow:3px 3px 0 rgba(0,0,0,.35);
  }
  .site-header .fsbtn:hover{background:#ffd700;color:#111}
  .site-header .fsbtn:active{transform:translate(2px,2px);box-shadow:1px 1px 0 rgba(0,0,0,.35)}

  .frame{
    width:calc(100% - 28px);
    max-width:1000px;
    margin:24px auto 60px;
    background:var(--black);
    border:6px solid var(--black);
    border-radius:14px;
    box-shadow:0 0 0 3px #2a1f1c, 0 20px 50px rgba(0,0,0,0.6);
    overflow:hidden;
  }

  /* ===== HEADER ===== */
  header{
    background:linear-gradient(180deg, var(--red-bright), var(--red-dark));
    text-align:center;
    padding:26px 20px 18px;
    border-bottom:4px solid var(--black);
    position:relative;
  }
  h1{
    font-family:'Press Start 2P', monospace;
    font-size:clamp(18px, 4vw, 34px);
    color:var(--cream);
    text-shadow:3px 3px 0 rgba(0,0,0,0.45);
    margin:0;
    letter-spacing:1px;
    line-height:1.4;
  }
  .subtitle{
    font-family:'Press Start 2P', monospace;
    font-size:11px;
    color:var(--gold-light);
    margin-top:12px;
    letter-spacing:2px;
  }

  /* ===== LEADER BANNER ===== */
  .leader-banner{
    margin:16px 20px 0;
    background:var(--red);
    border:3px solid var(--black);
    border-radius:6px;
    text-align:center;
    padding:12px 10px;
  }
  .leader-banner .txt{
    font-family:'Press Start 2P', monospace;
    font-size:clamp(12px,2.6vw,18px);
    color:var(--cream);
    letter-spacing:0.5px;
  }
  .leader-banner .dot{ color:#ff6b60; }

  /* ===== TABS ===== */
  nav.tabs{
    display:flex;
    flex-wrap:wrap;
    gap:8px;
    justify-content:center;
    padding:18px 20px 4px;
    background:var(--black);
  }
  .tab{
    font-family:'Press Start 2P', monospace;
    font-size:10.5px;
    color:var(--cream-dim);
    background:#241a17;
    border:3px solid var(--black);
    box-shadow:0 3px 0 #000;
    padding:10px 12px;
    cursor:pointer;
    border-radius:3px;
    letter-spacing:0.5px;
    transition:transform .1s ease;
    text-align:center;
  }
  .tab:hover{ color:var(--gold-light); transform:translateY(-2px); }
  .tab.active{
    background:var(--gold);
    color:var(--ink);
    box-shadow:0 3px 0 #8a6e1f;
  }

  main{ padding:18px 20px 8px; background:var(--black); }
  .panel{ display:none; }
  .panel.active{ display:block; animation:fadeIn .3s ease; }
  @keyframes fadeIn{ from{opacity:0; transform:translateY(6px);} to{opacity:1; transform:translateY(0);} }

  /* ===== WINNER PANEL (styled like team card) ===== */
  .winner-panel{
    border:3px solid var(--gold);
    border-radius:8px;
    overflow:hidden;
    background:var(--cream);
    box-shadow:0 6px 0 rgba(0,0,0,0.35);
  }
  .winner-top{
    background:linear-gradient(180deg, var(--red-bright), var(--red));
    padding:20px 18px 16px;
    display:flex;
    align-items:center;
    justify-content:space-between;
    gap:12px;
    flex-wrap:wrap;
    text-align:center;
  }
  .winner-top .crown{ font-size:38px; filter:drop-shadow(0 3px 0 rgba(0,0,0,0.4)); }
  .winner-mid{ flex:1; min-width:180px; }
  .cat-label{
    font-family:'Press Start 2P', monospace;
    font-size:13px;
    color:var(--cream);
    letter-spacing:1px;
    margin-bottom:8px;
  }
  .winner-name{
    font-family:'Press Start 2P', monospace;
    font-size:clamp(24px,5vw,40px);
    color:var(--cream);
    text-shadow:3px 3px 0 rgba(0,0,0,0.35);
    line-height:1;
  }
  .winner-votes{
    font-family:'VT323', monospace;
    font-size:18px;
    color:var(--gold-light);
    margin-top:6px;
  }
  .tagline{
    font-family:'VT323', monospace;
    font-size:16px;
    color:var(--cream-dim);
    font-style:italic;
    padding:8px 18px 0;
  }

  .mvp-strip{
    background:var(--gold);
    color:var(--ink);
    font-family:'Press Start 2P', monospace;
    font-size:11px;
    padding:10px 18px;
    letter-spacing:0.5px;
  }
  .mvp-strip b{ color:var(--red-dark); }

  /* ===== TABLE ===== */
  table.board{
    width:100%;
    border-collapse:collapse;
    margin-top:0;
  }
  table.board thead th{
    background:var(--ink);
    color:var(--cream);
    font-family:'Press Start 2P', monospace;
    font-size:10px;
    text-align:left;
    padding:10px 14px;
    letter-spacing:1px;
  }
  table.board thead th.num-col{ text-align:right; }
  table.board tbody tr{
    background:var(--cream);
  }
  table.board tbody tr:nth-child(even){
    background:var(--stripe-pink);
  }
  table.board tbody tr.top{
    background:var(--gold-light);
  }
  table.board td{
    padding:9px 14px;
    font-size:19px;
    color:var(--ink);
    border-top:1px solid rgba(0,0,0,0.08);
  }
  table.board td.rank{
    font-family:'Press Start 2P', monospace;
    font-size:12px;
    color:#b09a5c;
    width:34px;
  }
  table.board tr.top td.rank{ color:var(--red-dark); }
  table.board td.name{ font-weight:bold; }
  table.board td.score{
    text-align:right;
    font-family:'Press Start 2P', monospace;
    font-size:15px;
    color:var(--red);
  }
  .trophy-mini{ margin-left:6px; }

  /* ===== RECEIPTS ===== */
  .receipts-toggle{
    display:block;
    margin:18px auto 14px;
    font-family:'Press Start 2P', monospace;
    font-size:11px;
    background:#241a17;
    color:var(--gold-light);
    border:3px dashed var(--gold);
    padding:10px 16px;
    border-radius:4px;
    cursor:pointer;
    letter-spacing:0.5px;
  }
  .receipts-toggle:hover{ background:var(--red-dark); color:var(--cream); }

  .receipts{
    display:none;
    grid-template-columns:repeat(auto-fill, minmax(240px,1fr));
    gap:12px;
    padding-bottom:10px;
  }
  .receipts.open{ display:grid; }
  .receipt{
    background:var(--cream);
    border:3px solid var(--black);
    border-radius:5px;
    padding:12px 14px;
  }
  .receipt .voted-for{
    font-family:'Press Start 2P', monospace;
    font-size:8.5px;
    color:var(--red);
    letter-spacing:0.5px;
    margin-bottom:6px;
  }
  .receipt .voter{
    font-family:'Press Start 2P', monospace;
    font-size:11px;
    color:var(--ink);
    margin-bottom:6px;
  }
  .receipt .quote{
    font-size:19px;
    color:#3a2c26;
    line-height:1.25;
  }
  .receipt .quote.empty{
    font-style:italic;
    opacity:0.5;
    font-size:15px;
  }

  /* ===== FOOTER ===== */
  footer{
    background:linear-gradient(180deg, var(--red), var(--red-dark));
    border-top:4px solid var(--black);
    padding:14px 20px;
    display:flex;
    align-items:center;
    justify-content:space-between;
    gap:12px;
    flex-wrap:wrap;
  }
  .checker{
    height:10px;
    width:100%;
    background:repeating-linear-gradient(90deg, rgba(255,255,255,0.35) 0 22px, rgba(255,255,255,0.08) 22px 44px);
  }
  .foot-row{
    display:flex;
    align-items:center;
    justify-content:space-between;
    width:100%;
    padding-top:10px;
  }
  .live-txt{
    font-family:'VT323', monospace;
    font-size:16px;
    color:var(--cream-dim);
    display:flex;
    align-items:center;
    gap:6px;
  }
  .live-dot{
    width:8px; height:8px; border-radius:50%;
    background:#5ad65a;
    box-shadow:0 0 6px #5ad65a;
    display:inline-block;
  }
  .canoe{ font-size:26px; }

  @media (max-width:560px){
    body{ font-size:17px; }
    table.board td, table.board th{ padding:8px 8px; }
    table.board td.score{ font-size:12px; }
  }
</style>
</head>

<script>

      {voter:"Dan", target:"Yavuz", quote:"Yavuz is a G"},

const tabsEl = document.getElementById('tabs');
const panelsEl = document.getElementById('panels');
const leaderText = document.getElementById('leaderText');
const keys = Object.keys(DATA);

keys.forEach((key, i) => {
  const cat = DATA[key];

  const tab = document.createElement('button');
  tab.className = 'tab' + (i===0 ? ' active' : '');
  tab.dataset.key = key;
  tab.textContent = cat.emoji + ' ' + cat.label;
  tab.addEventListener('click', () => selectTab(key));
  tabsEl.appendChild(tab);

  const panel = document.createElement('section');
  panel.className = 'panel' + (i===0 ? ' active' : '');
  panel.id = 'panel-' + key;

  const winner = cat.votes[0];
  const totalVotes = cat.votes.reduce((s,v)=>s+v.count,0);

  let rowsHtml = '';
  cat.votes.forEach((v, idx) => {
    rowsHtml += `
      <tr class="${idx===0 ? 'top' : ''}">
        <td class="rank">${idx+1}</td>
        <td class="name">${v.name}${idx===0 ? '<span class="trophy-mini">🏆</span>' : ''}</td>
        <td class="score">${v.count}</td>
      </tr>`;
  });

  let receiptsHtml = '';
  cat.receipts.forEach(r => {
    const quoteHtml = r.quote
      ? `<div class="quote">"${r.quote}"</div>`
      : `<div class="quote empty">no reason given</div>`;
    receiptsHtml += `
      <div class="receipt">
        <div class="voted-for">VOTED FOR ${r.target.toUpperCase()}</div>
        <div class="voter">${r.voter}</div>
        ${quoteHtml}
      </div>`;
  });

  panel.innerHTML = `
    <div class="winner-panel">
      <div class="winner-top">
        <div class="crown">👑</div>
        <div class="winner-mid">
          <div class="cat-label">${cat.emoji} ${cat.label}</div>
          <div class="winner-name">${winner.name}</div>
          <div class="winner-votes">${winner.count} OF ${totalVotes} VOTES</div>
        </div>
        <div class="crown">👑</div>
      </div>
      <div class="tagline">${cat.tagline}</div>
      <div class="mvp-strip">🏆 WINNER: <b>${winner.name.toUpperCase()}</b> — ${winner.count} PTS</div>
      <table class="board">
        <thead>
          <tr><th>#</th><th>NOMINEE</th><th class="num-col">VOTES</th></tr>
        </thead>
        <tbody>${rowsHtml}</tbody>
      </table>
    </div>
    <button class="receipts-toggle">📋 SHOW THE RECEIPTS (${cat.receipts.length})</button>
    <div class="receipts">${receiptsHtml}</div>
  `;

  panelsEl.appendChild(panel);

  panel.querySelector('.receipts-toggle').addEventListener('click', (e) => {
    const r = panel.querySelector('.receipts');
    r.classList.toggle('open');
    e.target.textContent = r.classList.contains('open')
      ? '📋 HIDE THE RECEIPTS'
      : `📋 SHOW THE RECEIPTS (${cat.receipts.length})`;

});

function updateLeaderBanner(key){
  const cat = DATA[key];
  const winner = cat.votes[0];
  const total = cat.votes.reduce((s,v)=>s+v.count,0);
  leaderText.textContent = `${winner.name.toUpperCase()} LEADS "${cat.label}" WITH ${winner.count}/${total} VOTES`;
}

function selectTab(key){
  document.querySelectorAll('.tab').forEach(t => t.classList.toggle('active', t.dataset.key === key));
  document.querySelectorAll('.panel').forEach(p => p.classList.toggle('active', p.id === 'panel-' + key));
  updateLeaderBanner(key);
}

updateLeaderBanner(keys[0]);

// ── fullscreen + keep it across tab switches (same logic on all three pages) ──
// A real navigation drops out of fullscreen, so while fullscreen the tabs swap
// pages inside a full-viewport iframe instead. Pages loaded in that iframe
// (EMBEDDED) navigate normally — the top document stays fullscreen throughout.
(function(){
  var EMBEDDED = window.self !== window.top;
  var btn = document.getElementById('fsBtn');
  if(EMBEDDED){
    if(btn) btn.style.display='none';   // already fullscreen via the shell
  }else if(btn){
    btn.addEventListener('click', function(){
      if(document.fullscreenElement) document.exitFullscreen && document.exitFullscreen();
      else document.documentElement.requestFullscreen && document.documentElement.requestFullscreen();
    });
  }
  if(EMBEDDED) return;
  document.querySelectorAll('.site-header .sitenav a').forEach(function(a){
    a.addEventListener('click', function(e){
      if(!document.fullscreenElement) return;
      e.preventDefault();
      var f = document.getElementById('fsFrame');
      if(!f){
        f = document.createElement('iframe'); f.id='fsFrame'; f.allowFullscreen = true;
        f.style.cssText = 'position:fixed;inset:0;width:100vw;height:100vh;border:0;z-index:2147483000;background:#000';
        document.body.appendChild(f);
      }
      f.src = a.getAttribute('href');
    });
  });
  // leaving fullscreen: land for real on the page currently shown in the iframe
  document.addEventListener('fullscreenchange', function(){
    if(!document.fullscreenElement){
      var f = document.getElementById('fsFrame');
      if(f){ try{ window.location.href = f.contentWindow.location.href; }catch(_){ f.remove(); } }
    }
  });
})();
</script>
